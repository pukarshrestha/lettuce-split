<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Split bills fairly among friends. Add items, assign consumers, and see each person's share instantly." />
  <title>SplitHappens — Fair Bill Splitting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="index.css" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💚</text></svg>" />
</head>

<body>
  <div class="app-wrapper">

    <!-- ═══ Header ═══ -->
    <header class="app-header">
      <h1 class="app-header__title">
        Split<span class="app-header__title-accent">Happens</span>
      </h1>
      <div class="app-header__actions">
        <div class="currency-select-wrap">
          <label for="currency-select" class="sr-only">Currency</label>
          <select id="currency-select" class="currency-select" aria-label="Select currency">
            <option value="Rs." selected>Rs. (NPR)</option>
            <option value="$">$ (USD)</option>
            <option value="£">£ (GBP)</option>
            <option value="₹">₹ (INR)</option>
            <option value="৳">৳ (BDT)</option>
          </select>
        </div>
        <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"
          title="Toggle dark mode">
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ═══ Main Grid ═══ -->
    <div class="main-grid">

      <!-- ── People Card ── -->
      <section class="card full-width" aria-labelledby="people-heading">
        <div class="card__header">
          <div class="card__title-group">
            <div class="card__icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                <circle cx="9" cy="7" r="4" />
                <line x1="19" y1="8" x2="19" y2="14" />
                <line x1="22" y1="11" x2="16" y2="11" />
              </svg>
            </div>
            <h2 class="card__title" id="people-heading">People</h2>
          </div>
          <span class="card__badge" id="people-count">0</span>
        </div>
        <form class="form-row" id="add-person-form" autocomplete="off">
          <div class="form-group">
            <label for="person-name" class="form-label">Name</label>
            <input type="text" id="person-name" class="form-input" placeholder="e.g. Sarah" maxlength="30" required />
          </div>
          <button type="submit" class="btn btn--primary" aria-label="Add person">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add
          </button>
        </form>
        <div class="people-list" id="people-list" role="list" aria-label="Added people"
          style="margin-top: var(--spacing-lg);"></div>
      </section>

      <!-- ── Items Table (Full Width) ── -->
      <section class="card full-width" aria-labelledby="bill-heading" id="items-section">
        <div class="card__header">
          <div class="card__title-group">
            <div class="card__icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                <line x1="1" y1="10" x2="23" y2="10" />
              </svg>
            </div>
            <h2 class="card__title" id="bill-heading">Bill Items</h2>
          </div>
          <span class="card__badge" id="items-count">0 items</span>
        </div>
        <form class="form-row bill-form-row" id="add-item-form" autocomplete="off">
          <div class="form-group">
            <label for="item-name" class="form-label">Item name</label>
            <input type="text" id="item-name" class="form-input" placeholder="e.g. Margherita Pizza" maxlength="60"
              required />
          </div>
          <div class="form-group form-group--small">
            <label for="item-price" class="form-label">Unit price</label>
            <input type="number" id="item-price" class="form-input" placeholder="0.00" min="0.01" step="0.01"
              required />
          </div>
          <div class="form-group form-group--small">
            <label for="item-qty" class="form-label">Qty</label>
            <input type="number" id="item-qty" class="form-input" placeholder="1" min="1" step="1" value="1" required />
          </div>
          <button type="submit" class="btn btn--primary" aria-label="Add item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add
          </button>
        </form>
        <div id="items-table-wrap">
          <!-- rendered by JS -->
        </div>
        <div class="grand-total" id="grand-total" style="display:none;">
          <span class="grand-total__label">Grand Total</span>
          <span class="grand-total__amount" id="grand-total-amount">$0.00</span>
        </div>
      </section>

      <!-- ── Split Summary (Full Width) ── -->
      <section class="card full-width" aria-labelledby="split-heading">
        <div class="card__header">
          <div class="card__title-group">
            <div class="card__icon" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M6 10V14M18 10V14M2 8.2L2 15.8C2 16.9201 2 17.4802 2.21799 17.908C2.40973 18.2843 2.71569 18.5903 3.09202 18.782C3.51984 19 4.07989 19 5.2 19L18.8 19C19.9201 19 20.4802 19 20.908 18.782C21.2843 18.5903 21.5903 18.2843 21.782 17.908C22 17.4802 22 16.9201 22 15.8V8.2C22 7.0799 22 6.51984 21.782 6.09202C21.5903 5.7157 21.2843 5.40974 20.908 5.21799C20.4802 5 19.9201 5 18.8 5L5.2 5C4.0799 5 3.51984 5 3.09202 5.21799C2.7157 5.40973 2.40973 5.71569 2.21799 6.09202C2 6.51984 2 7.07989 2 8.2ZM14.5 12C14.5 13.3807 13.3807 14.5 12 14.5C10.6193 14.5 9.5 13.3807 9.5 12C9.5 10.6193 10.6193 9.5 12 9.5C13.3807 9.5 14.5 10.6193 14.5 12Z" />
              </svg>
            </div>
            <h2 class="card__title" id="split-heading">Split Summary</h2>
          </div>
          <div class="view-toggle" id="view-toggle" role="radiogroup" aria-label="Switch view">
            <button type="button" class="view-toggle__btn view-toggle__btn--active" data-view="cards"
              aria-label="Card view" title="Card view">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="3" width="9" height="8" rx="2" />
                <rect x="14" y="3" width="9" height="8" rx="2" />
                <rect x="1" y="13" width="9" height="8" rx="2" />
                <rect x="14" y="13" width="9" height="8" rx="2" />
              </svg>
            </button>
            <button type="button" class="view-toggle__btn" data-view="table" aria-label="Table view" title="Table view">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="4" width="22" height="16" rx="2" ry="2" />
                <line x1="1" y1="10" x2="23" y2="10" />
                <line x1="1" y1="16" x2="23" y2="16" />
                <line x1="9" y1="4" x2="9" y2="20" />
              </svg>
            </button>
          </div>
        </div>
        <div id="split-summary">
          <!-- rendered by JS -->
        </div>
      </section>

    </div><!-- /main-grid -->

    <!-- ═══ Export Section ═══ -->
    <section class="export-section" aria-labelledby="export-heading">
      <div class="export-section__actions">
        <button type="button" class="btn btn--secondary" id="export-pdf" aria-label="Export as PDF">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
            <polyline points="10 9 9 9 8 9" />
          </svg>
          Export as PDF
        </button>
      </div>
    </section>

  </div><!-- /app-wrapper -->

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
